<!DOCTYPE html>
<html>
    <head>
            <title>specificty exercise</title>
            <link rel="stylesheet" href="../assets/specificity.css">
            <style>
                /* embedded styles are more specific than external, but less specific than inline */
                header {
                    background-color: rgb(186, 150, 220);
                }
            </style>
    </head>


    <body>
        <h1>specificity</h1>

        <!-- inline styles are the most specific -->
        <header style="background-color:rgb(233, 240, 100);">
            style sheet specificity: <br>
        external < embedded < inline
        </header>

        <main class="class" id="id">
            identifier specificity: <br>
            tag < class < id
        </main>

        <footer> location specificity: <br>
            lower < higher
        </footer>

    </body>
</html>
